<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinanceFlow | Modern Data Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark-theme">
  <div id="app">
    <!-- Auth Screen -->
    <div id="auth-screen" class="hidden">
      <div class="auth-card glass">
        <h1 class="logo">Finance<span>Flow</span></h1>
        <p class="subtitle">Securely managing your wealth.</p>

        <!-- Login Form -->
        <div id="login-view">
          <form id="login-form">
            <input type="email" id="login-email" placeholder="Email Address" required>
            <input type="password" id="login-password" placeholder="Password" required>
            <button type="submit" class="btn btn-primary">Sign In</button>
          </form>
          <p class="switch-auth">Don't have an account? <a href="#" id="show-register">Register</a></p>
        </div>

        <!-- Register Form -->
        <div id="register-view" class="hidden">
          <form id="register-form">
            <input type="text" id="reg-name" placeholder="Full Name" required>
            <input type="email" id="reg-email" placeholder="Email Address" required>
            <input type="password" id="reg-password" placeholder="Password (min 8 chars)" required minlength="8">
            <button type="submit" class="btn btn-primary">Create Account</button>
          </form>
          <p class="switch-auth">Already have an account? <a href="#" id="show-login">Sign In</a></p>
        </div>

        <div id="auth-message" class="auth-msg hidden"></div>
      </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard-screen" class="hidden">
      <header class="glass">
        <div class="container flex-between">
          <h2 class="logo">Finance<span>Flow</span></h2>
          <div class="user-profile flex-center">
            <span id="user-name">John Doe</span>
            <button id="logout-btn" class="btn btn-sm btn-outline">Logout</button>
          </div>
        </div>
      </header>

      <main class="container">
        <!-- Summary Section -->
        <section class="summary-grid">
          <div class="card glass card-income">
            <p>Total Income</p>
            <h3 id="stat-income">$0.00</h3>
          </div>
          <div class="card glass card-expense">
            <p>Total Expenses</p>
            <h3 id="stat-expense">$0.00</h3>
          </div>
          <div class="card glass card-balance">
            <p>Net Balance</p>
            <h3 id="stat-balance">$0.00</h3>
          </div>
        </section>

        <div class="main-content-grid">
          <!-- Charts Section -->
          <section class="chart-section card glass">
            <h3>Monthly Spending Trends</h3>
            <div class="chart-container">
              <canvas id="trendsChart"></canvas>
            </div>
          </section>

          <!-- Records Section -->
          <section class="records-section card glass">
            <div class="flex-between">
              <h3>Recent Transactions</h3>
              <button id="add-record-btn" class="btn btn-sm btn-primary">+ Add New</button>
            </div>
            <div class="table-container">
              <table id="records-table">
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Category</th>
                    <th>Type</th>
                    <th>Amount</th>
                  </tr>
                </thead>
                <tbody id="records-list">
                  <!-- Records will be injected here -->
                </tbody>
              </table>
            </div>
          </section>
        </div>
      </main>
    </div>

    <!-- Modal for Adding Record -->
    <div id="record-modal" class="modal hidden">
      <div class="modal-content glass">
        <h3>New Transaction</h3>
        <form id="record-form">
          <div class="form-group">
            <label>Amount</label>
            <input type="number" step="0.01" required>
          </div>
          <div class="form-group">
            <label>Category</label>
            <input type="text" placeholder="e.g. Salary, Food" required>
          </div>
          <div class="form-group">
            <label>Type</label>
            <select required>
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
          </div>
          <div class="form-group">
            <label>Notes</label>
            <textarea placeholder="Optional notes..."></textarea>
          </div>
          <div class="flex-end">
            <button type="button" class="btn btn-outline close-modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Transaction</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
